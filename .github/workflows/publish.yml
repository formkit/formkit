name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, e.g. 2.0.0-abc123.dev'
        required: false
        type: string
      npm_tag:
        description: 'npm dist-tag to publish with'
        required: false
        default: 'next'
        type: choice
        options:
          - latest
          - next
          - dev
      git_ref:
        description: 'Git ref to checkout for manual publishes'
        required: false
        default: 'react'
        type: string
      dry_run:
        description: 'Run publish in dry-run mode'
        required: false
        default: true
        type: boolean

permissions:
  id-token: write # Required for OIDC trusted publishing
  contents: write # Required for creating GitHub releases

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for branch detection
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Determine npm tag and version from git tag
        id: npm-tag
        run: |
          infer_tag() {
            local version="$1"
            if [[ "$version" =~ (^|[-.])next([.-]|$) ]]; then
              echo "next"
            elif [[ "$version" =~ (^|[-.])dev([.-]|$) ]]; then
              echo "dev"
            else
              echo "latest"
            fi
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            TAG="${{ inputs.npm_tag }}"
            if [[ -z "$VERSION" ]]; then
              echo "ERROR: workflow_dispatch requires a version input"
              exit 1
            fi
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
            VERSION=${TAG_NAME#v}
            TAG=$(infer_tag "$VERSION")
            echo "Git tag: $TAG_NAME"
          fi

          echo "Version: $VERSION"
          echo "NPM tag: $TAG"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if [[ "$TAG" == "latest" ]]; then
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Verify branch for @latest releases
        if: steps.npm-tag.outputs.tag == 'latest'
        run: |
          # Check if this tag is on master branch
          if ! git branch -r --contains HEAD | grep -q 'origin/master'; then
            echo "ERROR: @latest releases can only be published from master branch"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: node scripts/cli.mjs --script build all

      - name: Publish packages
        run: |
          EXTRA_ARGS=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            EXTRA_ARGS="--dry-run"
          fi
          if [[ "${{ steps.npm-tag.outputs.is_prerelease }}" == "true" ]]; then
            node scripts/ci-publish.mjs --tag=${{ steps.npm-tag.outputs.tag }} --version=${{ steps.npm-tag.outputs.version }} $EXTRA_ARGS
          else
            node scripts/ci-publish.mjs --tag=${{ steps.npm-tag.outputs.tag }} $EXTRA_ARGS
          fi

      - name: Purge JSDelivr cache
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != true
        run: node scripts/ci-publish.mjs --purge-cdn --tag=${{ steps.npm-tag.outputs.tag }}

      - name: Create GitHub Release
        if: steps.npm-tag.outputs.tag == 'latest' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update docs-content changelog
        if: steps.npm-tag.outputs.tag == 'latest' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        env:
          DOCS_DEPLOY_KEY: ${{ secrets.DOCS_CONTENT_DEPLOY_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.npm-tag.outputs.version }}"
          TAG_NAME="v${VERSION}"

          # Fetch release body from GitHub API
          RELEASE_BODY=$(gh release view "$TAG_NAME" --json body -q .body)

          # Setup SSH for docs-content
          mkdir -p ~/.ssh
          echo "$DOCS_DEPLOY_KEY" > ~/.ssh/docs_deploy_key
          chmod 600 ~/.ssh/docs_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          # Clone docs-content
          GIT_SSH_COMMAND="ssh -i ~/.ssh/docs_deploy_key" git clone --depth 1 git@github.com:formkit/docs-content.git docs-content-repo
          cd docs-content-repo

          # Determine next file number
          TARGET_DIR="_changelog"
          LAST_NUM=$(ls "$TARGET_DIR" | grep -oE '^[0-9]+' | sort -n | tail -1)
          NEXT_NUM=$((LAST_NUM + 1))

          # Format date
          DATE=$(date "+%B %-d, %Y")

          # Create changelog file
          {
            echo "## ${VERSION}"
            echo ""
            echo "### ${DATE}"
            echo ""
            echo "$RELEASE_BODY"
          } > "${TARGET_DIR}/${NEXT_NUM}.v${VERSION}.md"

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs: add changelog for v${VERSION}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/docs_deploy_key" git push origin master
